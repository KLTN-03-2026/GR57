# ======================
# SERVER
# ======================
server.port=8080
server.error.include-stacktrace=never
server.servlet.session.timeout=10m

# ======================
# JPA / HIBERNATE
# ======================
spring.jpa.show-sql=${SQL_SHOW:false}
spring.jpa.properties.hibernate.format_sql=${SQL_FORMAT:false}
spring.jpa.hibernate.ddl-auto=${FUNCTION:update}
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.default_batch_fetch_size=16
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

# ======================
# DATABASE (SUPABASE / POSTGRES)
# ======================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?sslmode=require
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3

# ======================
# MVC / ERROR HANDLING
# ======================
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

spring.mvc.problemdetails.enabled=true
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
spring.web.error.include-stacktrace=never
spring.web.error.include-exception=false
spring.web.error.include-path=always
spring.web.error.whitelabel.enabled=false
spring.web.error.path=/error

# ======================
# LOGGING
# ======================
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=error
logging.level.org.springframework.web=warn
logging.level.org.springframework.security=warn
logging.level.org.springframework.transaction=warn
logging.level.org.springframework.orm.jpa=warn
logging.level.com.university=debug
logging.level.ums=debug

logging.file.name=logs/ums.log
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{15} - %msg%n

# ======================
# MAIL (SMTP Gmail)
# ======================
spring.mail.host=smtp.gmail.com
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ======================
# REDIS
# ======================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.username=default
spring.data.redis.ssl.enabled=false
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=8

# ======================
# JWT
# ======================
jwt.secret=${JWT_SECRET:dev-secret}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ======================
# EXTERNAL API
# ======================
groq.api.key=${GROQ_API_KEY:}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1}

sendgrid.api.key=${SENDGRID_API_KEY:}
learninghub.email.from=${MAIL_USERNAME:}

spring.jackson.time-zone=Asia/Ho_Chi_Minh


FRONTEND_URL=*